name: Release CLI

# Builds the `invmeta` command-line tool as self-contained, single-file binaries
# (no .NET install needed to run them) and, when a version tag is pushed, attaches
# them to a GitHub Release. Run manually (workflow_dispatch) to get the binaries as
# build artifacts without cutting a release.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build invmeta (${{ matrix.rid }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, linux-x64, osx-x64, osx-arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # .NET cross-publishes self-contained binaries for any RID from a single Linux
      # host (it pulls the target runtime pack), so the whole matrix runs on ubuntu.
      - name: Publish
        run: >
          dotnet publish src/InventorMeta.Cli/InventorMeta.Cli.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o out/${{ matrix.rid }}

      - name: Package
        run: |
          mkdir -p dist
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            cp "out/${{ matrix.rid }}/invmeta.exe" "dist/invmeta-${{ matrix.rid }}.exe"
          else
            chmod +x "out/${{ matrix.rid }}/invmeta"
            tar -C "out/${{ matrix.rid }}" -czf "dist/invmeta-${{ matrix.rid }}.tar.gz" invmeta
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: invmeta-${{ matrix.rid }}
          path: dist/*

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
