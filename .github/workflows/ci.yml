name: CI

# Builds the core library and runs the xUnit test suite on every push and pull
# request. The tests target net10.0 with no Windows dependencies, so they run on
# Linux. Release builds gate on their own test job (see release.yml).

on:
  push:
    branches: ['**']   # all branches; tag pushes are handled by release.yml
  pull_request:

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test
        run: dotnet test tests/InventorMeta.Tests/InventorMeta.Tests.csproj -c Release
